<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Questions</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --ink: #1a1714; --paper: #f5f0e8; --muted: #9a9186; --accent: #c8401a; --line: #d8d0c4; }
  html, body { height: 100%; background: var(--paper); color: var(--ink); font-family: 'Shippori Mincho', serif; overflow: hidden; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100dvh; padding: 2rem; position: relative; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; }
  .header { position: fixed; top: 0; left: 0; right: 0; padding: 1.5rem 2.5rem; display: flex; align-items: baseline; gap: 0.75rem; z-index: 10; }
  .header-title { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 1.1rem; letter-spacing: 0.02em; color: var(--ink); }
  .header-counter { font-size: 0.7rem; letter-spacing: 0.15em; color: var(--muted); }
  .progress-bar { position: fixed; top: 0; left: 0; height: 2px; background: var(--accent); transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); z-index: 20; }
  .card-wrap { position: relative; width: 100%; max-width: 520px; z-index: 1; }
  .card { position: relative; padding: 3.5rem 3rem; background: transparent; }
  .card::before, .card::after { content: ''; position: absolute; background: var(--ink); }
  .card::before { top: 0; left: 0; right: 0; height: 1.5px; }
  .card::after { bottom: 0; left: 0; right: 0; height: 1px; background: var(--line); }
  .card-label { font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-bottom: 2rem; display: block; }
  .question-text { font-size: clamp(1.35rem, 4vw, 1.75rem); line-height: 1.7; font-weight: 500; letter-spacing: 0.03em; color: var(--ink); min-height: 4em; display: flex; align-items: center; opacity: 1; transform: translateY(0); transition: opacity 0.3s ease, transform 0.3s ease; }
  .question-text.exit { opacity: 0; transform: translateY(-12px); }
  .question-text.enter { opacity: 0; transform: translateY(12px); }
  .bottom { position: fixed; bottom: 0; left: 0; right: 0; padding: 2rem 2.5rem; display: flex; align-items: center; justify-content: flex-end; z-index: 10; }
  .btn-next { display: flex; align-items: center; gap: 0.6rem; background: var(--ink); color: var(--paper); border: none; padding: 0.9rem 1.6rem; font-family: 'Shippori Mincho', serif; font-size: 0.8rem; letter-spacing: 0.15em; cursor: pointer; position: relative; overflow: hidden; }
  .btn-next::after { content: ''; position: absolute; inset: 0; background: var(--accent); transform: scaleX(0); transform-origin: left; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
  .btn-next:hover::after { transform: scaleX(1); }
  .btn-next:not(:hover)::after { transform: scaleX(0); }
  .btn-next.tapped::after { transform: scaleX(1); transition: transform 0.15s ease; }
  .btn-next:not(.tapped)::after { transform: scaleX(0); transition: transform 0.15s ease 0.15s; }
  .btn-next:active { transform: scale(0.97); }
  .btn-next span { position: relative; z-index: 1; }
  .btn-next svg { position: relative; z-index: 1; transition: transform 0.2s; }
  .btn-next:hover svg { transform: translateX(3px); }
  .finish { display: none; flex-direction: column; align-items: center; text-align: center; gap: 1.5rem; z-index: 1; }
  .finish.visible { display: flex; }
  .card-wrap.hidden { display: none; }
  .finish-mark { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 3rem; color: var(--accent); line-height: 1; }
  .finish-text { font-size: 0.85rem; letter-spacing: 0.1em; color: var(--muted); line-height: 1.8; }
  .btn-restart { margin-top: 1rem; background: none; border: 1px solid var(--ink); font-family: 'Shippori Mincho', serif; font-size: 0.75rem; letter-spacing: 0.15em; color: var(--ink); padding: 0.8rem 1.8rem; cursor: pointer; transition: background 0.2s, color 0.2s; }
  .btn-restart:hover { background: var(--ink); color: var(--paper); }
  .mode-wrap { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--paper); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3rem; z-index: 100; padding: 2rem; }
  .mode-wrap.hidden { display: none; }
  .mode-title { text-align: center; }
  .mode-title h1 { font-family: 'DM Serif Display', serif; font-style: italic; font-size: clamp(2.5rem, 8vw, 4rem); line-height: 1; margin-bottom: 0.5rem; }
  .mode-options { display: flex; flex-direction: column; gap: 0.75rem; width: 100%; max-width: 340px; }
  .mode-btn { background: none; border: 1px solid var(--line); font-family: 'Shippori Mincho', serif; padding: 1.1rem 1.5rem; cursor: pointer; text-align: left; transition: border-color 0.2s, background 0.2s; position: relative; }
  .mode-btn:hover { border-color: var(--ink); background: rgba(26,23,20,0.03); }
  .mode-btn-label { font-size: 0.85rem; letter-spacing: 0.1em; color: var(--ink); display: block; margin-bottom: 0.25rem; }
  .mode-btn-desc { font-size: 0.7rem; letter-spacing: 0.05em; color: var(--muted); }
  .mode-btn-dot { position: absolute; right: 1.2rem; top: 50%; transform: translateY(-50%); width: 6px; height: 6px; border-radius: 50%; background: var(--line); transition: background 0.2s; }
  .mode-btn:hover .mode-btn-dot { background: var(--accent); }
  @media (max-width: 480px) { .card { padding: 2.5rem 1.75rem; } .bottom { padding: 1.5rem; } .header { padding: 1.25rem 1.5rem; } }
</style>
</head>
<body>
<div class="progress-bar" id="progressBar"></div>
<div class="mode-wrap" id="modeWrap">
  <div class="mode-title">
    <h1>Good Questions</h1>
  </div>
  <div class="mode-options">
    <button class="mode-btn" onclick="startGame('light')">
      <span class="mode-btn-label">★</span>
      <span class="mode-btn-desc">答えやすい、自己開示は少なめ</span>
      <span class="mode-btn-dot"></span>
    </button>
    <button class="mode-btn" onclick="startGame('standard')">
      <span class="mode-btn-label">★★</span>
      <span class="mode-btn-desc">価値観・選択・振り返り</span>
      <span class="mode-btn-dot"></span>
    </button>
    <button class="mode-btn" onclick="startGame('deep')">
      <span class="mode-btn-label">★★★</span>
      <span class="mode-btn-desc">本音、後悔、これからの話</span>
      <span class="mode-btn-dot"></span>
    </button>
  </div>
</div>
<div class="header">
  <span class="header-title">Good Questions</span>
  <span class="header-counter" id="counter"></span>
</div>
<div class="card-wrap hidden" id="cardWrap">
  <div class="card">
    <span class="card-label" id="cardLabel">question</span>
    <p class="question-text" id="questionText"></p>
  </div>
</div>
<div class="finish" id="finish">
  <div class="finish-mark">—</div>
  <p class="finish-text">すべての問いが終わりました。<br>続きは、あなたたちの言葉で。</p>
  <button class="btn-restart" onclick="resetGame()">もう一度</button>
</div>
<div class="bottom" id="bottomBar" style="display:none">
  <button class="btn-next" onclick="nextQuestion()">
    <span>次の問いへ</span>
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>
<script>
const questions = {
  light: [
    "最近、時間を忘れた瞬間はあった？",
    "子どものころ、なりたかったものは何だった？",
    "ひとりのとき、何をしていることが多い？",
    "最近、誰かに教えてもらったことで、よかったと思うことは？",
    "旅先で、一番記憶に残っている場所はどこ？",
    "いま、密かに気になっていることや、はまっていることはある？",
    "自分の中で「これは得意だな」と思うことは？",
    "最近、笑ったのはどんなとき？",
    "好きな食べ物に、人柄が出ると思う？",
    "もう一度体験したい、過去の「一日」はある？",
    "最近買ってよかったものは？",
    "子どものころ、よく遊んでいた場所は？",
    "朝型と夜型、どっち？",
    "最近見て面白かった映画やドラマは？",
    "自分の出身地で好きなところは？",
    "好きな季節とその理由は？",
    "人生で一番ハマったゲームや趣味は？",
    "最近、誰かに親切にしてもらったことはある？",
    "自分のニックネームの由来は？",
    "得意料理はある？",
    "学生時代、どんな生徒だった？",
    "最近、新しく始めたことはある？",
    "行ってみたい国や場所はどこ？",
    "音楽を聴くのはどんなとき？",
    "一番好きな食べ方のご飯は？",
    "朝起きて最初にすることは？",
    "最近、自分を褒めてあげたいと思ったことは？",
    "動物を飼うとしたら何がいい？",
    "映画と本、どっちが好き？",
    "最近、外で感動した景色や瞬間はある？",
  ],
  standard: [
    "やめたことで、よかったと思っていることは？",
    "自分が変わったと気づいたのは、どんな瞬間だった？",
    "いまの仕事や生活を、続けている一番の理由は何だと思う？",
    "お金でも時間でもなく、何が足りていないと感じる？",
    "「これは譲れない」と思っていることは？",
    "10年前の自分が見たら、驚くことは何だと思う？",
    "最近、自分に正直にできていると思う？",
    "もう一度やり直せるとしたら、変える？変えない？",
    "誰かに影響を受けて、変わったことがある？",
    "いまの自分を一言で言うとしたら、何と言う？",
    "今の生活で、一番大切にしていることは？",
    "仕事とプライベート、どちらに比重を置いている？",
    "自分が一番成長したと思う時期はいつ？",
    "人間関係で大切にしていることは？",
    "挑戦してみたいけど、まだできていないことは？",
    "自分の強みだと思うことは？",
    "誰かに頼るのは得意？苦手？",
    "最近、自分の価値観が変わったと感じることはある？",
    "お金の使い方に、自分らしさが出ると思う？",
    "失敗から学んだ、一番大きなことは？",
    "自分が大切にしている習慣はある？",
    "理想の休日の過ごし方は？",
    "人に言いにくい自分の欠点は？",
    "「これは続けてよかった」と思えることは？",
    "自分にとって「成功」ってどういう状態？",
    "今の自分に足りていないと感じるスキルや経験は？",
    "人生で一番影響を受けた本や映画は？",
    "自分が怒るのはどんなとき？",
    "将来に対して、楽しみにしていることは？",
    "自分のペースを乱されるのは得意？苦手？",
  ],
  deep: [
    "5年後の自分に、いま何を報告したい？",
    "いま一番、避けていることは何？",
    "誰かに言えていない「ありがとう」がある？",
    "最近、正直に話せていないことがある？",
    "自分の「ここは変われていないな」と思うところは？",
    "後悔している選択と、後悔していない選択。どちらが多い？",
    "いまの自分は、なりたかった自分に近い？",
    "10年後、どんな状態だったら「うまくいった」と思える？",
    "だれかに「ごめん」と言えていないことがある？",
    "死ぬ前に、やっておきたいことがあるとしたら？",
    "自分の人生で、転換点になったと思う出来事は？",
    "今、一番恐れていることは何？",
    "親に感謝していること、伝えられていないことは？",
    "自分が本当にやりたいことを、後回しにしていないか？",
    "今の自分を形作った、一番大きな経験は？",
    "誰かを深く傷つけてしまったと思うことはある？",
    "自分の生き方に、迷いはある？",
    "「もっと早く気づけばよかった」と思うことは？",
    "自分が死んだあと、何を残したいと思う？",
    "今の自分に、正直に向き合えている？",
    "人生で一番孤独を感じた時期はいつ？",
    "自分が本当に信頼できると思う人は何人いる？",
    "幸せの基準が、昔と変わったと思う？",
    "自分の限界を感じたのはどんな瞬間？",
    "今の生き方を、10年後の自分は肯定してくれると思う？",
    "誰かのために、自分を犠牲にしたことはある？",
    "自分が本当に求めているものは、何だと思う？",
    "人生でもう一度やり直せるなら、何歳に戻りたい？",
    "今の自分が一番向き合いたくないことは？",
    "生きていてよかったと思った瞬間はある？",
  ]
};
let currentMode = null;
let pool = [];
let currentIndex = 0;
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function startGame(mode) {
  currentMode = mode;
  pool = shuffle(questions[mode]);
  currentIndex = 0;
  document.getElementById('modeWrap').classList.add('hidden');
  document.getElementById('cardWrap').classList.remove('hidden');
  document.getElementById('bottomBar').style.display = 'flex';
  const labels = { light: '★', standard: '★★', deep: '★★★' };
  document.getElementById('cardLabel').textContent = labels[mode];
  showQuestion();
}
function showQuestion() {
  const text = document.getElementById('questionText');
  const counter = document.getElementById('counter');
  const bar = document.getElementById('progressBar');
  counter.textContent = `${currentIndex + 1} / ${pool.length}`;
  bar.style.width = `${((currentIndex) / pool.length) * 100}%`;
  text.textContent = pool[currentIndex];
  text.classList.remove('exit', 'enter');
}
function nextQuestion() {
  const text = document.getElementById('questionText');
  const btn = document.querySelector('.btn-next');
  btn.classList.add('tapped');
  setTimeout(() => btn.classList.remove('tapped'), 300);
  text.classList.add('exit');
  setTimeout(() => {
    currentIndex++;
    if (currentIndex >= pool.length) { showFinish(); return; }
    document.getElementById('progressBar').style.width = `${((currentIndex) / pool.length) * 100}%`;
    document.getElementById('counter').textContent = `${currentIndex + 1} / ${pool.length}`;
    text.textContent = pool[currentIndex];
    text.classList.remove('exit');
    text.classList.add('enter');
    setTimeout(() => text.classList.remove('enter'), 50);
  }, 280);
}
function showFinish() {
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('cardWrap').classList.add('hidden');
  document.getElementById('bottomBar').style.display = 'none';
  document.getElementById('counter').textContent = '';
  document.getElementById('finish').classList.add('visible');
}
function resetGame() {
  document.getElementById('finish').classList.remove('visible');
  document.getElementById('modeWrap').classList.remove('hidden');
  document.getElementById('progressBar').style.width = '0%';
}
</script>
</body>
</html>
